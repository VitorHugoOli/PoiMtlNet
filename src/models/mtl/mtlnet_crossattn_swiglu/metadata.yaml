notes: >
  T2.4 LOW-risk hybrid. Subclass of mtlnet_crossattn that swaps the post-norm +
  GELU-FFN cross-attn block for a pre-norm + SwiGLU-FFN block (parallel
  bidirectional attention; SwiGLU hidden = round(2/3 * ffn_dim) for param
  parity). Only _build_shared_backbone is overridden; forward / partial-forwards
  / parameter-partition accessors are inherited. Tests whether modern-transformer
  backbone ingredients push reg above the STL ceiling under the C25 unweighted fix.
