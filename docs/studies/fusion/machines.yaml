# Multi-machine execution reference for the fusion ablation study
#
# State-pinning contract
# ----------------------
# A (state, engine) pair MUST run on one machine for the entire phase.
# Cross-hardware numerical differences (float32 rounding on MPS vs CUDA, BLAS
# variant, sklearn version) can shift fold indices or loss trajectories by a
# small amount.  If two machines run the same (state, engine) cell in P1, the
# results are not directly comparable as a paired test.
# Rule: when the coordinator assigns Alabama/fusion to mac-m4, ALL Alabama/fusion
# tests in that phase stay on mac-m4 — even if it would be faster to split them.
# Violations must be flagged in state.json open_issues before claiming results.

mac-m4:
  device: mps
  vram_gb: 24
  python: "3.12"
  sklearn_ref: "1.8.0"
  torch_ref: "2.11.0"
  recommended_tiers: [screen, promote]
  notes: >
    Primary coordinator. Owns state.json writes.  All study import / study
    analyze calls happen here.  Workers on other machines use --no-sync and
    ship result directories back for import.

linux-4050:
  device: cuda
  vram_gb: 8
  python: "3.12"
  sklearn_ref: "1.8.0"
  torch_ref: "2.11.0"
  recommended_tiers: [screen, promote, confirm]
  notes: >
    Needs rsync of output/{engine}/{state}/ (fold files + input parquets)
    before each phase.  Workers run study.py next --no-sync.  Tarballs or
    rsync result directories back to mac-m4 after each batch.

colab-a100:
  device: cuda
  vram_gb: 40
  python: "3.10"
  sklearn_ref: "1.4.x"
  torch_ref: "2.x"
  recommended_tiers: [confirm, heavy]
  notes: >
    Uses colab_runner.py + Google Drive.  Never writes state.json.
    Output packaged as .tar.gz + .meta.json for import on mac-m4 via
    `study import`.  Session-ephemeral: bootstrap each time with
    colab_runner.py bootstrap.

# Tier-to-minutes mapping (canonical source in _state.py TIER_MINUTES)
# screen  : ~3 min
# promote : ~6 min
# confirm : ~30 min
# heavy   : ~120 min
